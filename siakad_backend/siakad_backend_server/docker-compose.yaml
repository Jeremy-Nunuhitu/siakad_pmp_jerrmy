services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: siakad_backend
      POSTGRES_PASSWORD: "${SIAKAD_DB_PASSWORD:-v0-pqagO_xHp0kt-HWNBmfm1jTSSY-ZK}"
    volumes:
      - siakad_backend_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "${SIAKAD_REDIS_PASSWORD:-if14zyO0wmG888VAqkUorg_TEn9O6CJX}"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: siakad_backend_test
      POSTGRES_PASSWORD: "${SIAKAD_TEST_DB_PASSWORD:-5kfw07RmdnLAvBdBuQrujz1FtvmJpS0e}"
    volumes:
      - siakad_backend_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "${SIAKAD_TEST_REDIS_PASSWORD:-xbRU67uPbYJalxAEhDULdc6gKL302Jz9}"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  siakad_backend_data:
  siakad_backend_test_data:
